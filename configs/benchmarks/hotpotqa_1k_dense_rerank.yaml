dataset: hotpotqa_1k
seed: 0
paths:
  corpus_path: data/hotpotqa_1k/corpus.jsonl
  queries_path: data/hotpotqa_1k/queries.jsonl
  gold_path: data/hotpotqa_1k/gold.jsonl
  output_dir: runs/hotpotqa_1k_dense_rerank
chunk_size: 512
chunk_overlap: 64
retriever:
  candidate_top_n: 50
embedding:
  use_hash_embedder: false
  model_name: BAAI/bge-m3
  batch_size: 16
reranker:
  enabled: true
  model_name: BAAI/bge-reranker-v2-m3
  top_n_in: 50
  top_n_out: 10
  batch_size: 16
detector:
  window: 10
  background_mode: tail
selector:
  token_budget: 1024
generator:
  enabled: true
  provider: ollama
  model_name: llama3.1:8b-instruct-q4_K_M
  base_url: http://localhost:11434
  temperature: 0.0
  seed: 0
  max_tokens: 256
  prompt_style: citation
metrics:
  ks: [1, 3, 5, 10]
